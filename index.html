<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Family Tasks">
<title>Family To-Do</title>
<style>
  :root{
    --ink:#2b2a28; --paper:#f7f3ec; --line:#d9d2c4;
    --accent:#c1573a; --accent-soft:#f0d9d1;
    --green:#5c7a5e; --amber:#caa23a; --muted:#9a938a; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    background:var(--paper);color:var(--ink);
    -webkit-tap-highlight-color:transparent;padding-bottom:90px;
  }
  header{
    padding:max(18px,env(safe-area-inset-top)) 18px 10px;
    background:var(--paper);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:5;
  }
  h1{font-family:system-ui,sans-serif;font-size:28px;margin:0 0 2px;letter-spacing:.5px;}
  .sub{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:0 0 8px;transition:background .3s;}
  .sync-dot.live{background:var(--green);}
  .sync-dot.error{background:var(--accent);}

  /* ---- Filter rows ---- */
  /* Two rows: people on top, categories below */
  .filter-rows{
    border-bottom:1px solid var(--line);
    padding:8px 18px;
    display:flex;flex-direction:column;gap:6px;
  }
  .filter-row{
    display:flex;gap:6px;flex-wrap:wrap;
  }
  /* Shared chip style — smaller than before to fit without scrolling */
  .chip{
    padding:4px 11px;border-radius:999px;border:1px solid var(--line);
    background:#fff;font-size:12px;font-weight:600;color:var(--ink);
    white-space:nowrap;flex:0 0 auto;
  }
  .chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  /* Category chips: dim when no open tasks in that category */
  .chip.cat-empty{color:var(--muted);border-color:var(--line);background:#fff;}
  .chip.cat-empty.active{background:var(--muted);color:#fff;border-color:var(--muted);}

  main{padding:6px 18px 12px;}

  /* ---- Task cards ---- */
  .task{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;
    position:relative;overflow:hidden;
    transition:box-shadow .15s, opacity .15s;
    touch-action:none; /* needed for drag on iOS */
  }
  .task.urgent{border-color:var(--accent);}
  .task.urgent::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent);}
  .task.done{opacity:.5;}
  .task.done .task-name{text-decoration:line-through;}
  .task.dragging{opacity:.4;box-shadow:0 8px 24px rgba(0,0,0,.18);}
  .task.drag-over{border-color:var(--accent);border-style:dashed;}

  /* Drag handle */
  .drag-handle{
    flex:0 0 18px;display:flex;align-items:center;justify-content:center;
    color:var(--line);font-size:16px;cursor:grab;padding-top:3px;
    user-select:none;-webkit-user-select:none;
  }
  .drag-handle:active{cursor:grabbing;}

  .check{
    width:24px;height:24px;border-radius:50%;border:2px solid var(--line);
    flex:0 0 24px;display:flex;align-items:center;justify-content:center;
    margin-top:2px;background:#fff;
  }
  .task.done .check{background:var(--green);border-color:var(--green);}
  .check svg{width:14px;height:14px;opacity:0;}
  .task.done .check svg{opacity:1;}

  .task-body{flex:1;min-width:0;}
  .task-name{font-size:15.5px;font-weight:600;line-height:1.35;}
  .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--accent-soft);color:var(--accent);}
  .tag.who{background:#e4e7d8;color:#5c6b3a;}
  .tag.cat{background:#dde6ec;color:#3a5d70;}
  .tag.sub{background:#f1ece2;color:#8a7c5e;}
  .tag.due{background:#f2f2f2;color:#777;}
  .tag.due.overdue{background:var(--accent-soft);color:var(--accent);}
  .tag.due.today{background:#fdf0d0;color:#a07b1c;}

  .del{border:none;background:none;color:var(--muted);font-size:18px;padding:2px 4px;line-height:1;flex:0 0 auto;}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}

  .fab{
    position:fixed;right:20px;bottom:max(20px,env(safe-area-inset-bottom));
    width:56px;height:56px;border-radius:50%;background:var(--accent);
    color:#fff;border:none;font-size:28px;box-shadow:0 6px 18px rgba(0,0,0,.18);z-index:10;
  }

  /* ---- Sheet ---- */
  .sheet-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.35);
    opacity:0;pointer-events:none;transition:opacity .2s;z-index:20;
  }
  .sheet-backdrop.show{opacity:1;pointer-events:auto;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;background:var(--paper);
    border-radius:20px 20px 0 0;
    padding:18px 18px max(24px,env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .25s ease;
    z-index:21;max-height:85vh;overflow-y:auto;
    box-shadow:0 -8px 30px rgba(0,0,0,.2);
  }
  .sheet.show{transform:translateY(0);}
  .sheet h2{font-family:Georgia,serif;font-size:20px;margin:4px 0 16px;}
  label{
    display:block;font-size:12px;font-weight:700;text-transform:uppercase;
    letter-spacing:1px;color:var(--muted);margin:14px 0 6px;
  }
  input[type=text],input[type=date],select{
    width:100%;padding:11px 12px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;background:#fff;color:var(--ink);font-family:inherit;
  }
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .who-grid,.urgency-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .pillbtn{
    padding:8px 14px;border-radius:999px;border:1px solid var(--line);
    background:#fff;font-size:14px;font-weight:600;color:var(--ink);
  }
  .pillbtn.selected{background:var(--ink);color:#fff;border-color:var(--ink);}
  .pillbtn.urgent-opt.selected{background:var(--accent);border-color:var(--accent);}
  .sheet-actions{display:flex;gap:10px;margin-top:22px;}
  .btn{flex:1;padding:11px;border-radius:12px;border:none;font-size:15px;font-weight:700;}
  .btn.primary{background:var(--ink);color:#fff;}
  .btn.ghost{background:transparent;color:var(--muted);}
  .manage{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .manage input{flex:1;}
  .small-add{
    padding:11px 14px;border-radius:10px;border:none;
    background:var(--ink);color:#fff;font-weight:700;font-size:14px;
  }
  .chip-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .chip-item{
    display:flex;align-items:center;gap:5px;
    background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:5px 8px 5px 12px;font-size:13px;font-weight:600;
  }
  .chip-item .x{
    border:none;background:none;color:var(--muted);font-size:15px;
    line-height:1;padding:0 2px;cursor:pointer;
  }
  .chip-item .x:hover{color:var(--accent);}
</style>
</head>
<body>

<header>
  <h1>Family Tasks</h1>
  <div class="sub">
    <span class="sync-dot" id="syncDot"></span>
    <span id="summary">Connecting…</span>
  </div>
</header>

<!-- Two filter rows: people + categories -->
<div class="filter-rows">
  <div class="filter-row" id="filters-people"></div>
  <div class="filter-row" id="filters-cats"></div>
</div>

<main id="list"></main>
<button class="fab" id="addBtn" aria-label="Add task">+</button>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <h2 id="sheetTitle">New task</h2>

  <label>Task</label>
  <input type="text" id="f-name" placeholder="e.g. Take out recycling">

  <label>Assigned to</label>
  <div class="who-grid" id="who-grid"></div>
  <div class="manage">
    <input type="text" id="new-person" placeholder="Add family member">
    <button class="small-add" id="add-person">Add</button>
  </div>
  <div class="chip-list" id="people-chips"></div>

  <div class="row">
    <div>
      <label>Category</label>
      <select id="f-category"></select>
    </div>
    <div>
      <label>Sub-category</label>
      <select id="f-subcategory"></select>
    </div>
  </div>
  <div class="manage">
    <input type="text" id="new-cat" placeholder="New category">
    <button class="small-add" id="add-cat">Add</button>
  </div>
  <div class="chip-list" id="cat-chips"></div>
  <div class="manage">
    <input type="text" id="new-subcat" placeholder="New sub-category">
    <button class="small-add" id="add-subcat">Add</button>
  </div>
  <div class="chip-list" id="subcat-chips"></div>

  <label>Due date</label>
  <input type="date" id="f-due">

  <label>Urgency</label>
  <div class="urgency-grid" id="urgency-grid">
    <button type="button" class="pillbtn" data-val="low">Low</button>
    <button type="button" class="pillbtn" data-val="normal">Normal</button>
    <button type="button" class="pillbtn urgent-opt" data-val="urgent">Urgent</button>
  </div>

  <div class="sheet-actions">
    <button class="btn ghost" id="cancelBtn">Cancel</button>
    <button class="btn primary" id="saveBtn">Save task</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAh27UHBL3yPqeGPSrmtTdCfTwMVq4TUzw",
  authDomain:        "family-to-do-list-ee8a5.firebaseapp.com",
  databaseURL:       "https://family-to-do-list-ee8a5-default-rtdb.firebaseio.com",
  projectId:         "family-to-do-list-ee8a5",
  storageBucket:     "family-to-do-list-ee8a5.firebasestorage.app",
  messagingSenderId: "332017931388",
  appId:             "1:332017931388:web:fc2d6b4194c5cdc874e5f9"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ---- App state ----
let data = {
  people: ['Annalise','Tristam','Jonathan','Crissy'],
  categories: {
    'Household': ['Cleaning','Kitchen','Laundry'],
    'Errands':   ['Shopping','Appointments'],
    'School':    ['Homework','Projects','Permission slips']
  },
  tasks: [],
  filter: 'all',
  order: []   // array of task ids representing manual sort order
};
let editingId = null;

// ---- Firebase helpers ----
function dbRef(path){ return ref(db, path); }
function uid(){ return 't' + Math.random().toString(36).slice(2,10); }

function saveConfig(){
  set(dbRef('config'), {
    people:     data.people,
    categories: data.categories,
    filter:     data.filter,
    order:      data.order
  });
}

function saveTask(task){
  const {id, ...rest} = task;
  set(dbRef('tasks/' + id), rest);
}

function deleteTask(id){
  remove(dbRef('tasks/' + id));
  data.order = data.order.filter(x => x !== id);
  saveConfig();
}

// ---- Real-time listeners ----
const dot = document.getElementById('syncDot');

onValue(dbRef('config'), snap => {
  const val = snap.val();
  if (val) {
    if (val.people)     data.people     = val.people;
    if (val.categories) data.categories = val.categories;
    if (val.filter)     data.filter     = val.filter;
    if (val.order)      data.order      = val.order;
  }
  render();
});

onValue(dbRef('tasks'), snap => {
  const val = snap.val();
  data.tasks = val ? Object.entries(val).map(([id, t]) => ({...t, id})) : [];
  dot.className = 'sync-dot live';
  const open  = data.tasks.filter(t => !t.done).length;
  const total = data.tasks.length;
  document.getElementById('summary').textContent =
    total === 0 ? 'No tasks yet — tap + to add one'
                : open + ' open · ' + total + ' total';
  render();
}, () => {
  dot.className = 'sync-dot error';
  document.getElementById('summary').textContent = 'Connection error';
});

// ---- Dates ----
function fmtDate(iso){
  if (!iso) return null;
  return new Date(iso + 'T00:00:00').toLocaleDateString(undefined, {month:'short', day:'numeric'});
}
function dueStatus(iso){
  if (!iso) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso + 'T00:00:00');
  if (d < today) return 'overdue';
  if (d.getTime() === today.getTime()) return 'today';
  return 'future';
}

// ---- Filters ----
/*
  Two filter rows are rendered:
  Row 1 — "All" chip + one chip per person
  Row 2 — one chip per category, dimmed (cat-empty class) if that category
           has no open tasks under the current person filter
*/
function renderFilters(){
  const peoplEl = document.getElementById('filters-people');
  const catsEl  = document.getElementById('filters-cats');

  // Determine active person so category row can scope its counts
  const activePerson = data.filter.startsWith('person:') ? data.filter.slice(7) : null;
  const activecat    = data.filter.startsWith('cat:')    ? data.filter.slice(4) : null;

  // People row
  const peopleOpts = [
    {key:'all', label:'All'},
    ...data.people.map(p => ({key:'person:' + p, label:p}))
  ];
  peoplEl.innerHTML = '';
  peopleOpts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'chip' + (data.filter === o.key ? ' active' : '');
    b.textContent = o.label;
    b.onclick = () => { data.filter = o.key; saveConfig(); render(); };
    peoplEl.appendChild(b);
  });

  // Category row — count open tasks per category, scoped to active person
  catsEl.innerHTML = '';
  Object.keys(data.categories).forEach(cat => {
    const openInCat = data.tasks.filter(t =>
      !t.done &&
      t.category === cat &&
      (!activePerson || t.assignee === activePerson)
    ).length;
    const b = document.createElement('button');
    const isActiveCat = data.filter === 'cat:' + cat;
    b.className = 'chip'
      + (isActiveCat ? ' active' : '')
      + (openInCat === 0 && !isActiveCat ? ' cat-empty' : '');
    b.textContent = cat;
    b.onclick = () => {
      // Tapping the active category filter deselects it (back to person/all view)
      data.filter = isActiveCat
        ? (activePerson ? 'person:' + activePerson : 'all')
        : 'cat:' + cat;
      saveConfig(); render();
    };
    catsEl.appendChild(b);
  });
}

// ---- Task list ----
/*
  visibleTasks applies the active filter, then sorts:
  1. Open before done
  2. Within open: urgent first, then by due date
  3. Manual order (drag-and-drop) is preserved within the same urgency tier
     by using the order array index as a tiebreaker
*/
function visibleTasks(){
  let list = data.tasks.slice();

  if (data.filter.startsWith('person:'))
    list = list.filter(t => t.assignee === data.filter.slice(7));
  else if (data.filter.startsWith('cat:'))
    list = list.filter(t => t.category === data.filter.slice(4));

  list.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const ua = a.urgency==='urgent'?0:a.urgency==='normal'?1:2;
    const ub = b.urgency==='urgent'?0:b.urgency==='normal'?1:2;
    if (ua !== ub) return ua - ub;
    // Within same urgency, respect manual order
    const ia = data.order.indexOf(a.id);
    const ib = data.order.indexOf(b.id);
    if (ia !== -1 && ib !== -1) return ia - ib;
    if (ia !== -1) return -1;
    if (ib !== -1) return  1;
    // Fall back to due date
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1;
    if (b.due) return  1;
    return 0;
  });
  return list;
}

// ---- Render task list ----
function render(){
  renderFilters();
  const main  = document.getElementById('list');
  const tasks = visibleTasks();
  if (tasks.length === 0){
    main.innerHTML = '<div class="empty">Nothing here. Tap + to add a task.</div>';
    return;
  }
  main.innerHTML = '';
  tasks.forEach(t => {
    const card = document.createElement('div');
    card.className = 'task'
      + (t.urgency === 'urgent' && !t.done ? ' urgent' : '')
      + (t.done ? ' done' : '');
    card.dataset.id = t.id;

    // Drag handle (⠿ braille pattern looks like a grip icon)
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.textContent = '⠿';
    handle.title = 'Drag to reorder';
    card.appendChild(handle);

    const check = document.createElement('div');
    check.className = 'check';
    check.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    check.onclick = () => saveTask({...t, done: !t.done});
    card.appendChild(check);

    const body = document.createElement('div');
    body.className = 'task-body';

    const nm = document.createElement('div');
    nm.className = 'task-name';
    nm.textContent = t.name;
    body.appendChild(nm);

    const meta = document.createElement('div');
    meta.className = 'meta';

    function addTag(extraClass, text){
      const s = document.createElement('span');
      s.className = ('tag ' + extraClass).trim();
      s.textContent = text;
      meta.appendChild(s);
    }

    if (t.assignee)    addTag('who', t.assignee);
    if (t.category)    addTag('cat', t.category);
    if (t.subcategory) addTag('sub', t.subcategory);
    if (t.due){
      const st = dueStatus(t.due);
      addTag('due' + (st==='overdue'?' overdue':st==='today'?' today':''),
        (st==='overdue'?'Overdue · ':st==='today'?'Today · ':'Due ') + fmtDate(t.due));
    }
    if (t.urgency === 'urgent') addTag('', '⚑ Urgent');

    body.appendChild(meta);
    body.onclick = () => openSheet(t);
    card.appendChild(body);

    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '✕';
    del.onclick = () => deleteTask(t.id);
    card.appendChild(del);

    main.appendChild(card);
  });

  initDrag();
}

// ---- Drag-to-reorder ----
/*
  Uses the Pointer Events API which works on both iOS touch and desktop mouse.
  When a drag ends the new order of task IDs is saved to data.order in Firebase
  so all users see the same sequence.

  How it works:
  - pointerdown on the handle starts the drag
  - pointermove repositions a floating clone of the card
  - pointerup finds whichever card the clone is hovering over and inserts
    the dragged card before or after it, then saves the new order
*/
function initDrag(){
  const main = document.getElementById('list');
  let dragging = null;   // the real card element being dragged
  let clone    = null;   // the floating visual copy
  let startY   = 0;
  let offsetY  = 0;

  main.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('pointerdown', e => {
      e.preventDefault();
      const card = handle.closest('.task');
      dragging = card;
      const rect = card.getBoundingClientRect();
      startY  = e.clientY;
      offsetY = e.clientY - rect.top;

      // Create floating clone
      clone = card.cloneNode(true);
      clone.style.cssText = `
        position:fixed;left:${rect.left}px;top:${rect.top}px;
        width:${rect.width}px;z-index:100;pointer-events:none;
        box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:.95;
        border-radius:${getComputedStyle(card).borderRadius};
        background:#fff;
      `;
      document.body.appendChild(clone);
      card.classList.add('dragging');
      handle.setPointerCapture(e.pointerId);
    });

    handle.addEventListener('pointermove', e => {
      if (!dragging || !clone) return;
      e.preventDefault();
      clone.style.top = (e.clientY - offsetY) + 'px';

      // Highlight the card we're hovering over
      main.querySelectorAll('.task').forEach(c => c.classList.remove('drag-over'));
      const target = cardAtY(main, e.clientY);
      if (target && target !== dragging) target.classList.add('drag-over');
    });

    handle.addEventListener('pointerup', e => {
      if (!dragging || !clone) return;
      const target = cardAtY(main, e.clientY);
      if (target && target !== dragging){
        const cards   = [...main.querySelectorAll('.task')];
        const fromIdx = cards.indexOf(dragging);
        const toIdx   = cards.indexOf(target);
        if (fromIdx < toIdx)  target.after(dragging);
        else                  target.before(dragging);
      }
      // Save new order
      const newOrder = [...main.querySelectorAll('.task')].map(c => c.dataset.id);
      data.order = newOrder;
      saveConfig();

      clone.remove(); clone = null;
      dragging.classList.remove('dragging');
      main.querySelectorAll('.task').forEach(c => c.classList.remove('drag-over'));
      dragging = null;
    });
  });
}

function cardAtY(container, y){
  const cards = [...container.querySelectorAll('.task:not(.dragging)')];
  return cards.find(c => {
    const r = c.getBoundingClientRect();
    return y >= r.top && y <= r.bottom;
  }) || null;
}

// ---- Sheet ----
const sheet    = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');

function renderWhoGrid(){
  const el = document.getElementById('who-grid');
  el.innerHTML = '';
  data.people.forEach(p => {
    const b = document.createElement('button');
    b.type = 'button'; b.className = 'pillbtn'; b.dataset.val = p; b.textContent = p;
    b.onclick = () => {
      el.querySelectorAll('.pillbtn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    el.appendChild(b);
  });
  renderPeopleChips();
}

function renderPeopleChips(){
  const el = document.getElementById('people-chips');
  el.innerHTML = '';
  data.people.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'chip-item';
    chip.innerHTML = `<span>${p}</span><button class="x" title="Remove ${p}">✕</button>`;
    chip.querySelector('.x').onclick = () => {
      data.people = data.people.filter(x => x !== p);
      saveConfig(); renderWhoGrid();
    };
    el.appendChild(chip);
  });
}

function renderCatChips(){
  const el = document.getElementById('cat-chips');
  el.innerHTML = '';
  Object.keys(data.categories).forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'chip-item';
    chip.innerHTML = `<span>${c}</span><button class="x" title="Remove ${c}">✕</button>`;
    chip.querySelector('.x').onclick = () => {
      delete data.categories[c];
      saveConfig(); renderCategorySelect(); renderCatChips();
    };
    el.appendChild(chip);
  });
}

function renderSubcatChips(){
  const cat = document.getElementById('f-category').value;
  const el  = document.getElementById('subcat-chips');
  el.innerHTML = '';
  (data.categories[cat] || []).forEach(s => {
    const chip = document.createElement('div');
    chip.className = 'chip-item';
    chip.innerHTML = `<span>${s}</span><button class="x" title="Remove ${s}">✕</button>`;
    chip.querySelector('.x').onclick = () => {
      data.categories[cat] = data.categories[cat].filter(x => x !== s);
      saveConfig(); renderSubcategorySelect(); renderSubcatChips();
    };
    el.appendChild(chip);
  });
}

function renderCategorySelect(){
  const sel = document.getElementById('f-category');
  sel.innerHTML = '';
  Object.keys(data.categories).forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c; sel.appendChild(o);
  });
  renderSubcategorySelect();
  renderCatChips();
}

function renderSubcategorySelect(){
  const cat = document.getElementById('f-category').value;
  const sel = document.getElementById('f-subcategory');
  sel.innerHTML = '<option value="">—</option>';
  (data.categories[cat] || []).forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s; sel.appendChild(o);
  });
  renderSubcatChips();
}
document.getElementById('f-category').addEventListener('change', renderSubcategorySelect);

function openSheet(task){
  editingId = task ? task.id : null;
  document.getElementById('sheetTitle').textContent = task ? 'Edit task' : 'New task';
  renderWhoGrid(); renderCategorySelect();
  document.getElementById('f-name').value = task ? task.name : '';
  document.getElementById('f-due').value  = task ? (task.due || '') : '';
  document.querySelectorAll('#who-grid .pillbtn').forEach(b =>
    b.classList.toggle('selected', !!(task && b.dataset.val === task.assignee)));
  if (task && task.category){
    document.getElementById('f-category').value = task.category;
    renderSubcategorySelect();
    document.getElementById('f-subcategory').value = task.subcategory || '';
  }
  const urg = task ? (task.urgency || 'normal') : 'normal';
  document.querySelectorAll('#urgency-grid .pillbtn').forEach(b =>
    b.classList.toggle('selected', b.dataset.val === urg));
  backdrop.classList.add('show'); sheet.classList.add('show');
}

function closeSheet(){
  backdrop.classList.remove('show'); sheet.classList.remove('show'); editingId = null;
}

document.getElementById('addBtn').onclick    = () => openSheet(null);
document.getElementById('cancelBtn').onclick = closeSheet;
backdrop.onclick = closeSheet;

document.querySelectorAll('#urgency-grid .pillbtn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#urgency-grid .pillbtn').forEach(x => x.classList.remove('selected'));
    b.classList.add('selected');
  };
});

document.getElementById('saveBtn').onclick = () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name){ document.getElementById('f-name').focus(); return; }
  const whoBtn = document.querySelector('#who-grid .pillbtn.selected');
  const urgBtn = document.querySelector('#urgency-grid .pillbtn.selected');
  const existing = editingId ? data.tasks.find(x => x.id === editingId) : null;
  const task = {
    id:          editingId || uid(),
    name,
    assignee:    whoBtn ? whoBtn.dataset.val : '',
    category:    document.getElementById('f-category').value || '',
    subcategory: document.getElementById('f-subcategory').value || '',
    due:         document.getElementById('f-due').value || '',
    urgency:     urgBtn ? urgBtn.dataset.val : 'normal',
    done:        existing ? !!existing.done : false
  };
  saveTask(task);
  closeSheet();
};

// ---- People & Categories ----
document.getElementById('add-person').onclick = () => {
  const input = document.getElementById('new-person');
  const val = input.value.trim(); if (!val) return;
  if (!data.people.includes(val)) data.people.push(val);
  input.value = ''; saveConfig(); renderWhoGrid();
};

document.getElementById('add-cat').onclick = () => {
  const input = document.getElementById('new-cat');
  const val = input.value.trim(); if (!val) return;
  if (!data.categories[val]) data.categories[val] = [];
  input.value = ''; saveConfig(); renderCategorySelect();
  document.getElementById('f-category').value = val; renderSubcategorySelect();
};

document.getElementById('add-subcat').onclick = () => {
  const cat = document.getElementById('f-category').value;
  const input = document.getElementById('new-subcat');
  const val = input.value.trim(); if (!val || !cat) return;
  if (!data.categories[cat].includes(val)) data.categories[cat].push(val);
  input.value = ''; saveConfig(); renderSubcategorySelect();
  document.getElementById('f-subcategory').value = val;
};
</script>
</body>
</html>
